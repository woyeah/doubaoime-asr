services:
  doubao-asr:
    build: .
    image: doubaoime-asr:local
    container_name: doubao-asr
    volumes:
      - ./data:/data
      - ./examples:/app/examples:ro
    environment:
      DOUBAO_CREDENTIAL_PATH: /data/credentials.json
      # 走宿主机代理（按需取消注释；Windows/Mac 用 host.docker.internal）
      # HTTPS_PROXY: http://host.docker.internal:7890
      # HTTP_PROXY: http://host.docker.internal:7890
      # NO_PROXY: localhost,127.0.0.1
      PYTHONUNBUFFERED: "1"
    # 跑文件识别 demo：docker compose run --rm doubao-asr python examples/file_transcribe.py
    # 跑并发实测：    docker compose run --rm doubao-asr python examples/concurrency_test.py --n 4
    command: ["sleep", "infinity"]
